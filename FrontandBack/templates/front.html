<!DOCTYPE html>
<html lang="en"> 
<head>
    <style>
        body{
            margin: 0;
            background-color: #4a66c2;
            display: flex;
            height: 100vh;
            justify-content: center; 
            align-items: center; 
        }
        .CameraBox{
            background-color:#1E1F22;
            color: white;
            padding:40px;
            border-radius: 50px;
            text-align:center;
            display: inline-block  
        }
        #stream{
            /* font-family: monospace; */
            font-size: 12px;
            line-height: 16px;   
            letter-spacing: 0;
            white-space: pre;
            margin: 0;
        }
    </style> 
</head>
<body>
    <div class="CameraBox">
        <pre id="stream">Initializing camera feed...</pre>
    </div>

    <script>
    const streamEl = document.getElementById('stream');

        function connect() {
            const ws = new WebSocket(`ws://${location.host}/ws`);
            ws.onopen = () => console.log('connected');
            ws.onmessage = (e) => {
                streamEl.textContent = e.data;
            };
            ws.onclose = () => {
                streamEl.textContent = 'Disconnected, reconnecting';
                setTimeout(connect, 1000);   
            };
            ws.onerror = () => ws.close();
        }

        connect();
    </script>
</body>
</html>
